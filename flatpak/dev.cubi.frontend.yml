app-id: dev.cubi.frontend
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: cubi-frontend

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --filesystem=host
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: cubi-frontend
    buildsystem: simple
    build-commands:
      - ar x cubi-frontend.deb
      - mkdir -p extracted
      - tar -xf data.tar.* -C extracted
      - |
        binsrc=$(find extracted/usr/bin -type f | head -n1)
        install -Dm755 "$binsrc" /app/bin/cubi-frontend
      - |
        for size in 32x32 64x64 128x128 256x256 512x512; do
          src=$(find extracted/usr/share/icons/hicolor/${size}/apps -name "*.png" 2>/dev/null | head -n1)
          if [ -n "$src" ]; then
            install -Dm644 "$src" /app/share/icons/hicolor/${size}/apps/dev.cubi.frontend.png
          fi
        done
      - |
        desktop=$(find extracted/usr/share/applications -name "*.desktop" | head -n1)
        cp "$desktop" /tmp/app.desktop
        sed -i 's|^Icon=.*|Icon=dev.cubi.frontend|' /tmp/app.desktop
        install -Dm644 /tmp/app.desktop /app/share/applications/dev.cubi.frontend.desktop
      - install -Dm644 dev.cubi.frontend.metainfo.xml /app/share/metainfo/dev.cubi.frontend.metainfo.xml
    sources:
      - type: file
        path: cubi-frontend.deb
      - type: file
        path: dev.cubi.frontend.metainfo.xml
