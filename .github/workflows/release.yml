name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            label: Windows x64

          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            label: macOS Intel

          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macOS Apple Silicon

          - platform: ubuntu-22.04
            args: ''
            label: Linux x64

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cubi Frontend ${{ github.ref_name }}'
          releaseBody: |
            ## Cubi Frontend ${{ github.ref_name }}

            ### Downloads

            | Platform | File |
            |---|---|
            | Windows | `.msi` installer |
            | macOS Apple Silicon | `.dmg` disk image |
            | macOS Intel | `.dmg` disk image |
            | Linux | `.AppImage` (portable) or `.deb` (Debian/Ubuntu) |
            | Steam Deck / SteamOS | `.flatpak` (installable from KDE Discover) |

            ### Installation

            **Windows:** Run the `.msi` installer. WebView2 is required (pre-installed on Windows 10 1803+ and Windows 11).

            **macOS:** Open the `.dmg`, drag Cubi Frontend to Applications. On first launch, right-click → Open to bypass Gatekeeper.

            **Linux (AppImage):** `chmod +x Cubi*.AppImage && ./Cubi*.AppImage`

            **Linux (deb):** `sudo dpkg -i cubi-frontend_*.deb`

            **Steam Deck / SteamOS (Flatpak):** Switch to Desktop Mode, download the `.flatpak`, then double-click it — KDE Discover will prompt to install. Or run `flatpak install ./Cubi-Frontend-*-x86_64.flatpak`.

            ---

            See the [README](https://github.com/vjsr007/cubi-frontend#readme) for full setup instructions.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

  build-flatpak:
    name: Build — Steam Deck / Flatpak
    needs: publish-tauri
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flatpak + flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Platform//46 \
            org.gnome.Sdk//46

      - name: Download .deb from release
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: 'cubi-frontend_*_amd64.deb'
          out-file-path: 'flatpak'

      - name: Stage .deb for manifest
        run: mv flatpak/cubi-frontend_*_amd64.deb flatpak/cubi-frontend.deb

      - name: Build Flatpak bundle
        working-directory: flatpak
        run: |
          flatpak-builder --force-clean --repo=repo build-dir dev.cubi.frontend.yml
          VERSION="${GITHUB_REF_NAME#v}"
          flatpak build-bundle repo "Cubi-Frontend-${VERSION}-x86_64.flatpak" dev.cubi.frontend

      - name: Upload Flatpak to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: flatpak/Cubi-Frontend-*-x86_64.flatpak
